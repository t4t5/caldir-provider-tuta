name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version tag exists
        id: check
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${tag} does not exist, will release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Cross-compile Intel macOS on an available Apple Silicon runner.
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          archive="caldir-provider-tuta-${{ matrix.target }}"
          mkdir "$archive"
          cp "target/${{ matrix.target }}/release/caldir-provider-tuta" "$archive/"
          cp README.md LICENSE "$archive/"
          tar -czf "${archive}.tar.gz" "$archive"

      - uses: actions/upload-artifact@v4
        with:
          name: caldir-provider-tuta-${{ matrix.target }}
          path: caldir-provider-tuta-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ needs.check-version.outputs.version }}"
          gh release create "$tag" artifacts/*.tar.gz \
            --title "$tag" \
            --generate-notes
